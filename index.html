<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plinko - Baricup 26</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif;
    background: #0b0d10; color: #fff;
    overflow-x: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(circle 2px at center, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 18px 18px; pointer-events: none;
  }

  .container {
    display: flex; flex-direction: column; align-items: center;
    gap: 1.2rem; z-index: 1; width: 100%; max-width: 760px; padding: 1.5rem;
  }
  .logo-area { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 0.08em; line-height: 1; text-transform: uppercase; }
  .subtitle { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.4; }
  .divider { width: 200px; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); margin: 0.1rem 0; }

  .board-wrap {
    position: relative;
    background: rgba(0,0,0,0.35);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 18px 45px rgba(0,0,0,0.5);
  }
  canvas#plinko { display: block; border-radius: 8px; }

  /* legenda com as cores */
  .legend {
    display: flex; gap: 1.4rem; flex-wrap: wrap; justify-content: center; margin-top: 0.2rem;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .legend-item .swatch { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.5); }

  .result {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.06em;
    min-height: 2.2rem; text-align: center; color: #ffd700;
    opacity: 0; transform: translateY(8px); transition: opacity 0.5s, transform 0.5s;
  }
  .result.show { opacity: 1; transform: translateY(0); }

  .spin-btn {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.12em;
    padding: 12px 48px; border: 2px solid #fff; border-radius: 4px; cursor: pointer;
    background: transparent; color: #fff; text-transform: uppercase;
    transition: transform 0.2s, background 0.2s, color 0.2s;
  }
  .spin-btn:hover:not(:disabled) { background: #fff; color: #111; transform: scale(1.03); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .footer {
    display: flex; align-items: center; gap: 1.2rem; margin-top: 0.2rem;
    font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 0.15em; opacity: 0.35; text-transform: uppercase;
  }
  .footer .dot { width: 5px; height: 5px; border-radius: 50%; background: #fff; }

  .celebration-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.6s;
  }
  .celebration-overlay.active { opacity: 1; pointer-events: auto; }
  .celebration-overlay .trophy { font-size: 4rem; margin-bottom: 1rem; animation: trophyBounce 0.8s ease infinite alternate; }
  @keyframes trophyBounce { 0% { transform: scale(1) rotate(-5deg); } 100% { transform: scale(1.1) rotate(5deg); } }
  .celebration-overlay .congrats-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: #ffd700; text-transform: uppercase; margin-bottom: 0.5rem; opacity: 0; }
  .celebration-overlay .winner-name-big { font-family: 'Bebas Neue', sans-serif; font-size: 3.8rem; color: #fff; text-transform: uppercase; margin-bottom: 1.5rem; opacity: 0; }
  .celebration-overlay .prize-text { font-family: 'Outfit', sans-serif; font-size: 1.3rem; color: #fff; text-align: center; line-height: 1.6; max-width: 500px; opacity: 0; }
  .celebration-overlay .prize-highlight { color: #ffd700; font-weight: 800; }
  .celebration-overlay .close-btn {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.12em;
    padding: 12px 40px; border: 2px solid rgba(255,255,255,0.3); border-radius: 4px; cursor: pointer;
    background: transparent; color: #fff; text-transform: uppercase; margin-top: 2rem; opacity: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .celebration-overlay .close-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); }
  @keyframes popIn { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

  .confetti-piece { position: fixed; pointer-events: none; z-index: 300; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(100vh) rotate(720deg); } }
</style>
</head>
<body>

<div class="container">
  <div class="logo-area">
    <div class="title">Baricup 26</div>
    <div class="divider"></div>
    <div class="subtitle">Plinko oficial</div>
  </div>

  <div class="board-wrap">
    <canvas id="plinko" width="720" height="440"></canvas>
  </div>

  <div class="legend" id="legend"></div>

  <div class="result" id="result"></div>
  <button class="spin-btn" id="startBtn">Soltar as bolinhas</button>

  <div class="footer"><span>CWB</span><div class="dot"></div><span>IMOB</span></div>
</div>

<div class="celebration-overlay" id="celebration">
  <div class="trophy">🏆</div>
  <div class="congrats-title" id="congratsTitle">Parabéns!</div>
  <div class="winner-name-big" id="winnerName"></div>
  <div class="prize-text" id="prizeText">
    Você ganhou uma<br><span class="prize-highlight">camisa oficial da Seleção Brasileira!</span>
  </div>
  <button class="close-btn" id="closeBtn">Voltar</button>
</div>

<script>
(function () {
  // nome + cor de cada competidor
  const players = [
    { name: "Caique Gomes",             color: "#3aa0ff" },
    { name: "Danielle Yonamine",        color: "#ff5b8a" },
    { name: "Anna Vitoria da Silveira", color: "#ffd54a" },
    { name: "Brendom Souza",            color: "#4ade80" }
  ];

  const canvas = document.getElementById("plinko");
  const ctx = canvas.getContext("2d");
  const btn = document.getElementById("startBtn");
  const resultEl = document.getElementById("result");

  const W = canvas.width, H = canvas.height;
  const N = players.length;              // 4 colunas
  const colW = W / N;                    // largura de cada faixa
  const TOP = 30;                        // onde as bolinhas começam
  const BOTTOM = H - 34;                 // linha de chegada
  const BALL_R = 9;
  const PEG_R = 4;

  // legenda
  const legendEl = document.getElementById("legend");
  players.forEach(p => {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `<span class="swatch" style="background:${p.color}"></span>${p.name}`;
    legendEl.appendChild(item);
  });

  // ==== PINOS: grade triangular densa por faixa (estilo Galton board) ====
  // linhas alternam meio-passo no X, e os pinos são próximos o bastante para a
  // bolinha bater em uma a cada linha — é isso que gera o ziguezague constante.
  const ROWS = 12;
  const rowGap = (BOTTOM - TOP - 55) / ROWS;
  const pegs = [];                       // {x, y, lane}
  const pegCols = 4;                     // pinos por linha, dentro da faixa
  for (let c = 0; c < N; c++) {
    const laneLeft = c * colW;
    const usable = colW - 24;            // margem interna
    const pegGap = usable / pegCols;
    for (let r = 0; r < ROWS; r++) {
      const y = TOP + 45 + r * rowGap;
      const shift = (r % 2 === 0) ? 0 : pegGap / 2;   // meio-passo alternado
      for (let k = 0; k <= pegCols; k++) {
        const x = laneLeft + 12 + k * pegGap + shift - pegGap / 2;
        // mantém dentro da faixa
        if (x > laneLeft + 8 && x < laneLeft + colW - 8) {
          pegs.push({ x, y, lane: c });
        }
      }
    }
  }

  let balls = [];
  let running = false;
  let winnerIdx = null;

  // cada pessoa fica FIXA na sua coluna
  // assim a cor/posição da bolinha sempre corresponde ao nome mostrado.
  // (o viés de coluna é desprezível com 4 faixas idênticas + física caótica dos pinos.)
  function makeBalls() {
    balls = players.map((p, i) => ({
      idx: i,                       // identidade da pessoa
      lane: i,                      // coluna fixa = índice
      x: i * colW + colW / 2,
      y: TOP,
      vx: 0,
      vy: 0,
      color: p.color,
      done: false,
      finishTime: null
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // faixas
    for (let c = 0; c < N; c++) {
      ctx.fillStyle = c % 2 === 0 ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.05)";
      ctx.fillRect(c * colW, 0, colW, H);
      // divisória
      if (c > 0) {
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(c * colW, 0); ctx.lineTo(c * colW, H); ctx.stroke();
      }
    }

    // linha de chegada
    ctx.strokeStyle = "rgba(255,215,0,0.6)";
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 5]);
    ctx.beginPath(); ctx.moveTo(0, BOTTOM); ctx.lineTo(W, BOTTOM); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "rgba(255,215,0,0.7)";
    ctx.font = "12px 'Bebas Neue', sans-serif";
    ctx.fillText("CHEGADA", 6, BOTTOM - 6);

    // pinos
    for (const peg of pegs) {
      ctx.beginPath();
      ctx.arc(peg.x, peg.y, PEG_R, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.fill();
    }

    // bolinhas
    for (const b of balls) {
      ctx.beginPath();
      ctx.arc(b.x + 1.5, b.y + 2, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.fill();

      const g = ctx.createRadialGradient(b.x - 3, b.y - 3, 1, b.x, b.y, BALL_R);
      g.addColorStop(0, "#fff");
      g.addColorStop(0.4, b.color);
      g.addColorStop(1, b.color);
      ctx.beginPath();
      ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  makeBalls();
  draw();

  function launchConfetti() {
    const colors = ["#009c3b", "#ffdf00", "#002776", "#ffffff", "#009c3b", "#ffdf00"];
    for (let i = 0; i < 70; i++) {
      const p = document.createElement("div");
      p.className = "confetti-piece";
      p.style.left = Math.random() * 100 + "vw";
      p.style.top = "-10px";
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.width = (4 + Math.random() * 8) + "px";
      p.style.height = (4 + Math.random() * 8) + "px";
      p.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
      p.style.animationDuration = (2 + Math.random() * 2.5) + "s";
      p.style.animationDelay = Math.random() * 0.6 + "s";
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5500);
    }
  }

  function showCelebration(name) {
    document.getElementById("winnerName").textContent = name.toUpperCase();
    const overlay = document.getElementById("celebration");
    const ct = document.getElementById("congratsTitle");
    const wn = document.getElementById("winnerName");
    const pt = document.getElementById("prizeText");
    const cb = document.getElementById("closeBtn");
    [ct, wn, pt, cb].forEach(el => el.style.animation = "none");
    void ct.offsetWidth;
    ct.style.animation = "popIn 0.5s ease 0.3s forwards";
    wn.style.animation = "slideUp 0.5s ease 0.6s forwards";
    pt.style.animation = "slideUp 0.5s ease 0.9s forwards";
    cb.style.animation = "slideUp 0.5s ease 1.2s forwards";
    overlay.classList.add("active");
    launchConfetti();
    setTimeout(launchConfetti, 800);
    setTimeout(launchConfetti, 1600);
  }

  function start() {
    if (running) return;
    running = true;
    btn.disabled = true;
    resultEl.classList.remove("show");
    resultEl.textContent = "";
    makeBalls();

    // Sem sorteio nos bastidores: o vencedor é quem cruzar a linha primeiro.
    // A justiça vem de duas fontes aleatórias combinadas: a coluna de cada pessoa
    // é embaralhada (makeBalls) e a física do quique é caótica. Ninguém acumula vantagem.
    winnerIdx = null;

    // mesma gravidade para todas as bolinhas
    const G_BASE = 0.09;   // gravidade: menor = queda mais lenta (era 0.24)

    let finishedCount = 0;
    const finishOrder = [];

    function tick() {
      for (const b of balls) {
        if (b.done) continue;

        b.vy += G_BASE;
        b.vx *= 0.94;                 // atrito horizontal
        // teto na velocidade lateral pra não disparar entre as paredes
        const VX_MAX = 3.0;   // teto lateral, reduzido junto com a gravidade (era 4.5)
        if (b.vx > VX_MAX) b.vx = VX_MAX;
        if (b.vx < -VX_MAX) b.vx = -VX_MAX;
        b.y += b.vy;
        b.x += b.vx;

        // colisão com pinos da própria faixa
        for (const peg of pegs) {
          if (peg.lane !== b.lane) continue;
          const dx = b.x - peg.x, dy = b.y - peg.y;
          const dist = Math.hypot(dx, dy);
          const minDist = BALL_R + PEG_R;
          if (dist < minDist && dist > 0) {
            // empurra pra fora ao longo da normal do contato (deflexão real)
            const nx = dx / dist, ny = dy / dist;
            const overlap = minDist - dist;
            b.x += nx * overlap;
            b.y += ny * overlap;
            // kick lateral forte pro lado do contato + aleatoriedade pequena
            const side = nx >= 0 ? 1 : -1;
            b.vx += side * (2.0 + Math.random() * 1.4);
            // mantém boa parte da velocidade vertical (bate mas continua caindo)
            b.vy *= 0.72;
          }
        }

        // paredes da faixa
        const left = b.lane * colW + BALL_R + 4;
        const right = (b.lane + 1) * colW - BALL_R - 4;
        if (b.x < left) { b.x = left; b.vx = Math.abs(b.vx) * 0.35; }
        if (b.x > right) { b.x = right; b.vx = -Math.abs(b.vx) * 0.35; }

        // chegou? marca; o vencedor do frame é decidido depois do loop.
        if (b.y >= BOTTOM - BALL_R) {
          b.y = BOTTOM - BALL_R;
          b.done = true;
          finishOrder.push(b);
          finishedCount++;
        }
      }

      draw();

      // decide o vencedor sem viés de ordem do array:
      // entre quem cruzou, ganha quem foi mais fundo; empate exato -> sorteio.
      if (winnerIdx === null && finishOrder.length > 0) {
        const maxY = Math.max(...finishOrder.map(b => b.y));
        const tied = finishOrder.filter(b => b.y === maxY);
        winnerIdx = tied[Math.floor(Math.random() * tied.length)].idx;
      }

      if (winnerIdx !== null) {
        running = false;
        btn.disabled = false;
        const name = players[winnerIdx].name;
        resultEl.textContent = name.toUpperCase() + " venceu!";
        resultEl.classList.add("show");
        launchConfetti();
        setTimeout(() => showCelebration(name), 1400);
        return;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  btn.addEventListener("click", start);
  document.getElementById("closeBtn").addEventListener("click", function () {
    document.getElementById("celebration").classList.remove("active");
    makeBalls();
    draw();
  });
})();
</script>
</body>
</html>
