<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta Cassino - Baricup 26</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
    background: #111;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle 2px at center, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    position: relative;
    z-index: 1;
  }

  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    margin-bottom: 0.3rem;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.08em;
    line-height: 1;
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.4;
  }

  .divider {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    margin: 0.1rem 0;
  }

  .wheel-area {
    position: relative;
    width: 380px;
    height: 380px;
  }

  canvas#rouletteCanvas {
    position: absolute;
    inset: 0;
    z-index: 2;
  }

  .players-area {
    display: flex;
    gap: 2rem;
    align-items: center;
  }

  .player-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    padding: 1rem 1.8rem;
    border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.1);
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    min-width: 140px;
  }

  .player-card.white-card { background: rgba(255,255,255,0.05); }
  .player-card.black-card { background: rgba(0,0,0,0.3); }

  .player-card .color-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
  }

  .player-card.white-card .color-dot { background: #ffffff; }
  .player-card.black-card .color-dot { background: #1a1a1a; }

  .player-card .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .player-card.winner {
    border-color: #ffd700;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    transform: scale(1.05);
  }

  .vs-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    opacity: 0.3;
    letter-spacing: 0.1em;
  }

  .result {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.06em;
    min-height: 2.4rem;
    text-align: center;
    color: #ffd700;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s, transform 0.5s;
  }

  .result.show { opacity: 1; transform: translateY(0); }

  .spin-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.12em;
    padding: 12px 48px;
    border: 2px solid #fff;
    border-radius: 4px;
    cursor: pointer;
    background: transparent;
    color: #fff;
    text-transform: uppercase;
    transition: transform 0.2s, background 0.2s, color 0.2s;
  }

  .spin-btn:hover:not(:disabled) {
    background: #fff;
    color: #111;
    transform: scale(1.03);
  }

  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .footer {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin-top: 0.3rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    opacity: 0.35;
    text-transform: uppercase;
  }

  .footer .dot { width: 5px; height: 5px; border-radius: 50%; background: #fff; }

  .celebration-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s;
  }

  .celebration-overlay.active { opacity: 1; pointer-events: auto; }

  .celebration-overlay .trophy {
    font-size: 4rem;
    margin-bottom: 1rem;
    animation: trophyBounce 0.8s ease infinite alternate;
  }

  @keyframes trophyBounce {
    0% { transform: scale(1) rotate(-5deg); }
    100% { transform: scale(1.1) rotate(5deg); }
  }

  .celebration-overlay .congrats-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: #ffd700;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    opacity: 0;
    transform: scale(0.5);
  }

  .celebration-overlay .winner-name-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.8rem;
    color: #ffffff;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    opacity: 0;
    transform: translateY(20px);
  }

  .celebration-overlay .prize-text {
    font-family: 'Outfit', sans-serif;
    font-size: 1.3rem;
    color: #ffffff;
    text-align: center;
    line-height: 1.6;
    max-width: 500px;
    opacity: 0;
    transform: translateY(20px);
  }

  .celebration-overlay .prize-highlight { color: #ffd700; font-weight: 800; }

  .celebration-overlay .close-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    padding: 12px 40px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    cursor: pointer;
    background: transparent;
    color: #ffffff;
    text-transform: uppercase;
    margin-top: 2rem;
    opacity: 0;
    transition: background 0.2s, border-color 0.2s;
  }

  .celebration-overlay .close-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.6);
  }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes slideUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 300;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo-area">
    <div class="title">Baricup 26</div>
    <div class="divider"></div>
    <div class="subtitle">Sorteio oficial</div>
  </div>

  <div class="wheel-area">
    <canvas id="rouletteCanvas" width="380" height="380"></canvas>
  </div>

  <div class="players-area">
    <div class="player-card white-card" id="card0">
      <div class="color-dot"></div>
      <div class="player-name">Regis Borges</div>
      <div style="font-size:0.75rem; opacity:0.5; text-transform:uppercase; letter-spacing:0.1em;">Branco</div>
    </div>
    <div class="vs-text">VS</div>
    <div class="player-card black-card" id="card1">
      <div class="color-dot"></div>
      <div class="player-name">Amon Maia</div>
      <div style="font-size:0.75rem; opacity:0.5; text-transform:uppercase; letter-spacing:0.1em;">Preto</div>
    </div>
  </div>

  <div class="result" id="result"></div>
  <button class="spin-btn" id="spinBtn">Lançar a bola</button>

  <div class="footer">
    <span>CWB</span>
    <div class="dot"></div>
    <span>IMOB</span>
  </div>
</div>

<div class="celebration-overlay" id="celebration">
  <div class="trophy">🏆</div>
  <div class="congrats-title" id="congratsTitle">Parabéns!</div>
  <div class="winner-name-big" id="winnerName"></div>
  <div class="prize-text" id="prizeText">
    Você ganhou uma<br><span class="prize-highlight">camisa oficial da Seleção Brasileira!</span>
  </div>
  <button class="close-btn" id="closeBtn">Voltar</button>
</div>

<script>
(function () {
  const players = [
    { name: "Regis Borges", color: "white" },
    { name: "Amon Maia", color: "black" }
  ];

  const canvas = document.getElementById("rouletteCanvas");
  const ctx = canvas.getContext("2d");
  const btn = document.getElementById("spinBtn");
  const resultEl = document.getElementById("result");

  const W = 380;
  const CX = W / 2, CY = W / 2;
  const RIM_OUTER = 185;
  const SLOT_OUTER = 168;
  const SLOT_INNER = 120;
  const SLOT_MID = (SLOT_OUTER + SLOT_INNER) / 2;
  const HUB_R = SLOT_INNER - 5;
  const NUM_SLOTS = 20;
  const SLOT_ANGLE = (Math.PI * 2) / NUM_SLOTS;
  const BALL_TRACK_R = 176;
  const BALL_R = 7;

  let wheelAngle = 0;
  let spinning = false;
  let showBall = false;
  let ballAngle = 0;
  let ballRadius = BALL_TRACK_R;

  function slotFill(i) { return i % 2 === 0 ? "#e0e0e0" : "#1a1a1a"; }
  function slotText(i) { return i % 2 === 0 ? "#333" : "#bbb"; }

  function draw() {
    ctx.clearRect(0, 0, W, W);

    // === RIM ===
    const rimG = ctx.createRadialGradient(CX, CY, SLOT_OUTER, CX, CY, RIM_OUTER);
    rimG.addColorStop(0, "#333");
    rimG.addColorStop(0.4, "#222");
    rimG.addColorStop(1, "#111");
    ctx.beginPath();
    ctx.arc(CX, CY, RIM_OUTER, 0, Math.PI * 2);
    ctx.fillStyle = rimG;
    ctx.fill();

    // Ball track groove
    ctx.beginPath();
    ctx.arc(CX, CY, BALL_TRACK_R, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.07)";
    ctx.lineWidth = 3;
    ctx.stroke();

    // Deflectors
    for (let d = 0; d < 8; d++) {
      const da = d * Math.PI / 4;
      const dx = CX + (SLOT_OUTER + 10) * Math.cos(da);
      const dy = CY + (SLOT_OUTER + 10) * Math.sin(da);
      ctx.beginPath();
      ctx.moveTo(
        dx + 6 * Math.cos(da),
        dy + 6 * Math.sin(da)
      );
      ctx.lineTo(
        dx + 4 * Math.cos(da + 0.6),
        dy + 4 * Math.sin(da + 0.6)
      );
      ctx.lineTo(
        dx + 4 * Math.cos(da - 0.6),
        dy + 4 * Math.sin(da - 0.6)
      );
      ctx.closePath();
      ctx.fillStyle = "#777";
      ctx.fill();
    }

    // === WHEEL (rotates) ===
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(wheelAngle);

    // Slots
    for (let i = 0; i < NUM_SLOTS; i++) {
      const a0 = i * SLOT_ANGLE;
      const a1 = a0 + SLOT_ANGLE;

      ctx.beginPath();
      ctx.arc(0, 0, SLOT_OUTER, a0, a1);
      ctx.arc(0, 0, SLOT_INNER, a1, a0, true);
      ctx.closePath();
      ctx.fillStyle = slotFill(i);
      ctx.fill();

      // Fret
      ctx.beginPath();
      ctx.moveTo(SLOT_INNER * Math.cos(a0), SLOT_INNER * Math.sin(a0));
      ctx.lineTo(SLOT_OUTER * Math.cos(a0), SLOT_OUTER * Math.sin(a0));
      ctx.strokeStyle = "#888";
      ctx.lineWidth = 1.8;
      ctx.stroke();

      // Number
      ctx.save();
      ctx.rotate(a0 + SLOT_ANGLE / 2);
      ctx.fillStyle = slotText(i);
      ctx.font = "600 12px 'Bebas Neue', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(i + 1, SLOT_MID, 0);
      ctx.restore();
    }

    // Last fret
    ctx.beginPath();
    ctx.arc(0, 0, SLOT_OUTER, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.12)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0, 0, SLOT_INNER, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Hub
    const hubG = ctx.createRadialGradient(-6, -6, 4, 0, 0, HUB_R);
    hubG.addColorStop(0, "#3a3a3a");
    hubG.addColorStop(0.7, "#1e1e1e");
    hubG.addColorStop(1, "#111");
    ctx.beginPath();
    ctx.arc(0, 0, HUB_R, 0, Math.PI * 2);
    ctx.fillStyle = hubG;
    ctx.fill();
    ctx.strokeStyle = "#444";
    ctx.lineWidth = 1;
    ctx.stroke();

    // Center cone
    const coneG = ctx.createRadialGradient(-2, -2, 1, 0, 0, 24);
    coneG.addColorStop(0, "#ccc");
    coneG.addColorStop(0.3, "#999");
    coneG.addColorStop(1, "#333");
    ctx.beginPath();
    ctx.arc(0, 0, 24, 0, Math.PI * 2);
    ctx.fillStyle = coneG;
    ctx.fill();

    // Cross
    ctx.strokeStyle = "#777";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(20, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(0, 20); ctx.stroke();

    // Spindle
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fillStyle = "#ddd";
    ctx.fill();

    ctx.restore(); // end wheel rotation

    // === BALL (absolute position) ===
    if (showBall) {
      const bx = CX + ballRadius * Math.cos(ballAngle);
      const by = CY + ballRadius * Math.sin(ballAngle);

      ctx.beginPath();
      ctx.arc(bx + 2, by + 2, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fill();

      const bG = ctx.createRadialGradient(bx - 2, by - 2, 1, bx, by, BALL_R);
      bG.addColorStop(0, "#fff");
      bG.addColorStop(0.5, "#ddd");
      bG.addColorStop(1, "#888");
      ctx.beginPath();
      ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = bG;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(bx - 2, by - 2, 2, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.fill();
    }

    // Outer shadow ring
    ctx.beginPath();
    ctx.arc(CX, CY, RIM_OUTER, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(0,0,0,0.4)";
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  draw();

  function launchConfetti() {
    const colors = ["#009c3b", "#ffdf00", "#002776", "#ffffff", "#009c3b", "#ffdf00"];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement("div");
      p.className = "confetti-piece";
      p.style.left = Math.random() * 100 + "vw";
      p.style.top = -10 + "px";
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.width = (4 + Math.random() * 8) + "px";
      p.style.height = (4 + Math.random() * 8) + "px";
      p.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
      p.style.animationDuration = (2 + Math.random() * 2.5) + "s";
      p.style.animationDelay = Math.random() * 0.6 + "s";
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5500);
    }
  }

  function showCelebration(name) {
    document.getElementById("winnerName").textContent = name.toUpperCase();
    const overlay = document.getElementById("celebration");
    const ct = document.getElementById("congratsTitle");
    const wn = document.getElementById("winnerName");
    const pt = document.getElementById("prizeText");
    const cb = document.getElementById("closeBtn");

    ct.style.animation = "none"; wn.style.animation = "none";
    pt.style.animation = "none"; cb.style.animation = "none";
    void ct.offsetWidth;
    ct.style.animation = "popIn 0.5s ease 0.3s forwards";
    wn.style.animation = "slideUp 0.5s ease 0.6s forwards";
    pt.style.animation = "slideUp 0.5s ease 0.9s forwards";
    cb.style.animation = "slideUp 0.5s ease 1.2s forwards";

    overlay.classList.add("active");
    launchConfetti();
    setTimeout(launchConfetti, 800);
    setTimeout(launchConfetti, 1600);
  }

  btn.addEventListener("click", function () {
    if (spinning) return;
    spinning = true;
    showBall = true;
    btn.disabled = true;
    resultEl.classList.remove("show");
    resultEl.textContent = "";
    document.getElementById("card0").classList.remove("winner");
    document.getElementById("card1").classList.remove("winner");

    // Physics
    let wVel = 0.04 + Math.random() * 0.02;   // wheel clockwise
    let bVel = -(0.10 + Math.random() * 0.05); // ball counter-clockwise (faster)
    ballAngle = Math.random() * Math.PI * 2;
    ballRadius = BALL_TRACK_R;
    let dropped = false;
    let settleCount = 0;

    const dropDelay = 2200 + Math.random() * 1200;
    const t0 = performance.now();

    function tick(now) {
      const elapsed = now - t0;

      // Wheel always decelerates
      wheelAngle += wVel;
      wVel *= 0.9985;

      if (!dropped) {
        // Ball on outer track
        ballAngle += bVel;
        bVel *= (elapsed < dropDelay) ? 0.997 : 0.98;

        // Start dropping when ball is slow enough or time elapsed
        if (elapsed > dropDelay && Math.abs(bVel) < 0.04) {
          dropped = true;
        }
      } else {
        // Ball spiraling inward
        ballAngle += bVel;
        bVel *= 0.98;

        const target = SLOT_MID;
        ballRadius += (target - ballRadius) * 0.03;

        // Bounce effect near slots
        if (ballRadius < SLOT_OUTER && ballRadius > target - 5) {
          ballRadius += Math.sin(elapsed * 0.025) * 3 * Math.max(0, Math.abs(bVel) / 0.01);
        }

        // Settled?
        if (Math.abs(bVel) < 0.002 && Math.abs(ballRadius - target) < 4) {
          settleCount++;
        } else {
          settleCount = 0;
        }

        if (settleCount > 20) {
          ballRadius = target;
          bVel = 0;

          // Which slot?
          const rel = ((ballAngle - wheelAngle) % (Math.PI * 2) + Math.PI * 4) % (Math.PI * 2);
          const slotIdx = Math.floor(rel / SLOT_ANGLE) % NUM_SLOTS;
          const isWhite = slotIdx % 2 === 0;
          const winner = isWhite ? players[0] : players[1];
          const cardId = isWhite ? "card0" : "card1";

          // Lock ball to slot
          ballAngle = wheelAngle + slotIdx * SLOT_ANGLE + SLOT_ANGLE / 2;

          // Coast wheel to stop
          function coast() {
            if (wVel > 0.0003) {
              wheelAngle += wVel;
              wVel *= 0.992;
              ballAngle = wheelAngle + slotIdx * SLOT_ANGLE + SLOT_ANGLE / 2;
              draw();
              requestAnimationFrame(coast);
            } else {
              wVel = 0;
              draw();
              spinning = false;
              btn.disabled = false;

              document.getElementById(cardId).classList.add("winner");
              resultEl.textContent = winner.name.toUpperCase() + " venceu!";
              resultEl.classList.add("show");
              launchConfetti();
              setTimeout(() => showCelebration(winner.name), 1800);
            }
          }
          coast();
          return;
        }
      }

      draw();
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  });

  document.getElementById("closeBtn").addEventListener("click", function () {
    document.getElementById("celebration").classList.remove("active");
  });
})();
</script>
</body>
</html>
